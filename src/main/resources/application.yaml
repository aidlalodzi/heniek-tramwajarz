spring:
  application:
    name: HeniekTramwajarz


general-configuration:
  root-url: "http://rozklady.lodz.pl"
  exclude-lines:
    - name: "Bez linii pracowniczych"
      pattern: "^P.*"
      active: true
    - name: "Bez linii zastępczych"
      pattern: "^Z.*"
      active: false
    - name: "Bez linii nocnych"
      pattern: "^N.*"
      active: false
    - name: "Bez rezerw liniowych"
      pattern: "^R.*"
      active: true
    - name: "Bez konkretnie wskazanych linii"
      pattern: "oP6|6\\."
      active: true
  exclude-routes:
    - name: "Bez zjazdów i wyjazdów z zajezdni Telefoniczna"
      pattern: ""
      active: true
    - name: "Bez zjazdów i wyjazdów z zajezdni Chocianowice"
      pattern: "^Z.*"
      active: false
